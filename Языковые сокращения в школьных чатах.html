<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Словарь языковых сокращений в школьных чатах</title>
    
    <!-- СТИЛИ ИЗ CSS -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        input[type="text"]:focus {
            border-color: #3498db;
            outline: none;
        }

        .results-container {
            margin-bottom: 25px;
        }

        .result-card {
            background: #ecf0f1;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 5px solid #3498db;
        }

        .result-card h3 {
            margin-bottom: 5px;
            color: #2980b9;
        }

        .add-section h2 {
            font-size: 18px;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .add-section button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .add-section button:hover {
            background-color: #27ae60;
        }

        #statusMessage {
            margin-top: 15px;
            font-size: 14px;
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Словарь русских сокращений в школьных чатах</h1>
        </header>

        <main>
            <!-- Блок поиска -->
            <section class="search-section">
                <input type="text" id="searchInput" placeholder="Введите сокращение (например, РФ, СНГ)...">
                <div id="results" class="results-container"></div>
            </section>

            <!-- Блок добавления нового сокращения -->
            <section class="add-section">
                <h2>Добавить сокращение</h2>
                <form id="addForm">
                    <input type="text" id="newAcronym" placeholder="Сокращение (напр., ВУЗ)" required>
                    <input type="text" id="newMeaning" placeholder="Расшифровка (напр., Высшее учебное заведение)" required>
                    <button type="submit">Добавить</button>
                </form>
                <p id="statusMessage"></p>
            </section>
        </main>
    </div>
    
    <!-- СЦЕНАРИЙ JAVASCRIPT -->
    <script>
        // База данных "из коробки"
        const initialDictionary = [
            { acronym: "РФ", meaning: "Российская Федерация" },
            { acronym: "СНГ", meaning: "Содружество Независимых Государств" },
            { acronym: "комп", meaning: "компьютер" },
            { acronym: "ВУЗ", meaning: "Высшее учебное заведение" },
            { acronym: "клава", meaning: "клавиатура" },
	    { acronym: "про100", meaning: "просто" },
	    { acronym: "ПОП", meaning: "побольше отдыха, пожалуйста" },
            { acronym: "хард", meaning: "жесткий диск" },
	    { acronym: "ЛДПУ", meaning: "люди добрые, помогите ученникам" },
	    { acronym: "норм", meaning: "нормально" },
	    { acronym: "!т", meaning: "ответ" },
            { acronym: "1жды", meaning: "однажды" },
            { acronym: "4то", meaning: "что" },
            { acronym: "7я", meaning: "семья" },
            { acronym: "АПВС", meaning: "А Почему Вы Спрашиваете?" },
            { acronym: "афаик", meaning: "русский вариант AFAIK (as far as I know - насколько  я знаю)" },
            { acronym: "бб", meaning: "Русский вариант bye-bye (пока, пока-пока)" },
            { acronym: "бмп", meaning: "без малейшего понятия" },
            { acronym: "буш", meaning: "будешь" },
            { acronym: "буу", meaning: "буду учить уроки" },
            { acronym: "ВБ", meaning: "Высокий балл" },
            { acronym: "вну3", meaning: "внутри" },
            { acronym: "выхи", meaning: "выходные" },
            { acronym: "дкт", meaning: "диктант" },
            { acronym: "ДТКЗ", meaning: "Для Тех, Кто Знает" },
            { acronym: "зач", meaning: "зачем" },
            { acronym: "ЗЫ", meaning: "эквивалент аббревиатуры P.S., постскриптум" },
            { acronym: "ИМХО", meaning: "IMHO, по моему скромному мнению" },
            { acronym: "инет", meaning: "Интернет" },
            { acronym: "кст", meaning: "кстати" },
	    { acronym: "КТО", meaning: "Какой Ты Оригинальный" },    
            { acronym: "лан", meaning: "ладно" },   
            { acronym: "лкм", meaning: "левая кнопка мыши" },   
            { acronym: "пкм", meaning: "правая кнопка мыши" },   
            { acronym: "ЛОЛ", meaning: "русский вариант LOL (laugh out loud - смеюсь до слез)" },   
            { acronym: "лю", meaning: "люблю" },   
            { acronym: "мб", meaning: "может быть" },   
            { acronym: "МУМУ", meaning: "мультимедиа" },   
            { acronym: "нзч", meaning: "не за что" },
            { acronym: "поч", meaning: "почему" },  
            { acronym: "рофл", meaning: "русский вариант Rolling On the Floor Laughing (кататься по полу от смеха), шутка, прикол" },  
            { acronym: "сэнкс", meaning: "русский вариант thanks (спасибо)" },  
            { acronym: "СУМ", meaning: "Сиди, учи математику" },  
            { acronym: "УЗИ", meaning: "Ужасно Загадочная История" },  
            { acronym: "хрш", meaning: "хорошо" },  
            { acronym: "жорик", meaning: "жесткий диск" },  
            { acronym: "ЧАВО", meaning: "ЧАсто задаваемые ВОпросы" }, 
            { acronym: "чз", meaning: "что задали (о домашней работе)" }, 
            { acronym: "ща", meaning: "сейчас" }, 
            { acronym: "яп", meaning: "я понял (а)" } 
        ];

        // Загрузка словаря из localStorage или использование начального
        let dictionary = JSON.parse(localStorage.getItem('acronyms')) || initialDictionary;
        localStorage.setItem('acronyms', JSON.stringify(dictionary));

        // Элементы страницы
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('results');
        const addForm = document.getElementById('addForm');
        const newAcronymInput = document.getElementById('newAcronym');
        const newMeaningInput = document.getElementById('newMeaning');
        const statusMessage = document.getElementById('statusMessage');

        // Функция отображения результатов поиска
        function displayResults(query) {
            resultsContainer.innerHTML = '';
            
            if (!query) return;

            // Поиск совпадений (регистр не учитывается)
            const filtered = dictionary.filter(item => 
                item.acronym.toLowerCase().startsWith(query.toLowerCase())
            );

            if (filtered.length === 0) {
                resultsContainer.innerHTML = `<div class="result-card"><h3>Ничего не найдено</h3><p>Вы можете добавить это сокращение ниже.</p></div>`;
                return;
            }

            // Вывод карточек
            filtered.forEach(item => {
                const card = document.createElement('div');
                card.classList.add('result-card');
                card.innerHTML = `
                    <h3>${item.acronym.toUpperCase()}</h3>
                    <p>${item.meaning}</p>
                `;
                resultsContainer.appendChild(card);
            });
        }

        // Функция добавления нового термина
        function addAcronym(e) {
            e.preventDefault();

            const acronym = newAcronymInput.value.trim().toUpperCase();
            const meaning = newMeaningInput.value.trim();

            // Проверка на дубликаты
            const exists = dictionary.some(item => item.acronym === acronym);
            if (exists) {
                statusMessage.textContent = 'Такое сокращение уже существует в словаре!';
                statusMessage.style.color = '#e74c3c';
                return;
            }

            // Добавление и сохранение
            dictionary.push({ acronym, meaning });
            localStorage.setItem('acronyms', JSON.stringify(dictionary));

            // Очистка формы и вывод статуса
            statusMessage.textContent = `Сокращение "${acronym}" успешно добавлено!`;
            statusMessage.style.color = '#2ecc71';
            newAcronymInput.value = '';
            newMeaningInput.value = '';

            // Обновление поиска после добавления
            displayResults(searchInput.value);
        }

        // События
        searchInput.addEventListener('input', (e) => displayResults(e.target.value));
        addForm.addEventListener('submit', addAcronym);
    </script>
</body>
</html>
